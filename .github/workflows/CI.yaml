name: CI

on: 
  push

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock ruff mypy types-PyYAML
          # Устанавливаем сам проект в "редактируемом" режиме, чтобы он был виден как пакет
          # Это сработает, если у вас в корне есть setup.py или pyproject.toml
          if [ -f setup.py ] || [ -f pyproject.toml ]; then pip install -e .; fi
          # Устанавливаем остальные зависимости
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: ruff check src/

      - name: Type check with Mypy
        run: mypy src --ignore-missing-imports

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest --cov=src --cov-report=xml

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}